name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > composeApp/google-services.json

      - name: Check code style (ktlint)
        run: ./gradlew ktlintCheck

      - name: Run static analysis (detekt)
        run: ./gradlew detekt

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug
